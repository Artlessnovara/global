{% extends "base.html" %}

{% block title %}Edit Group - GLOOBA{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('chat_info', conversation_id=conversation.id) }}"><i class="fas fa-arrow-left"></i></a>
                    <h5 class="mb-0">Edit Group</h5>
                    <div></div> {# Spacer #}
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('edit_group_chat', conversation_id=conversation.id) }}" enctype="multipart/form-data">
                        <div class="text-center mb-4">
                            <img src="{{ url_for('static', filename=conversation.group_photo_path) if conversation.group_photo_path else url_for('static', filename='img/default-avatar.png') }}"
                                 alt="{{ conversation.name }}" class="img-fluid rounded-circle" style="width: 120px; height: 120px; object-fit: cover;">
                            <label for="group_photo" class="btn btn-link">Change photo</label>
                            <input type="file" id="group_photo" name="group_photo" class="d-none" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label for="group_name" class="form-label">Group Name</label>
                            <input type="text" class="form-control" id="group_name" name="group_name" value="{{ conversation.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ conversation.description or '' }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
