<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GLOOBA{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <a href="{{ url_for('home') }}" class="logo">GLOOBA</a>
        </div>
        <div class="top-bar-center">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search GLOOBA">
            </div>
        </div>
        <div class="top-bar-right">
            <a href="#" class="icon-button">
                <i class="fa-brands fa-facebook-messenger"></i>
            </a>
             <a href="{{ url_for('logout') }}" class="icon-button">
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        </div>
    </header>

    {% if request.endpoint != 'reels' %}
    <nav class="main-nav">
        <a href="{{ url_for('home') }}" class="nav-icon {% if request.endpoint == 'home' %}active{% endif %}"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-icon"><i class="fas fa-user-friends"></i></a>
        <a href="{{ url_for('reels') }}" class="nav-icon {% if request.endpoint == 'reels' %}active{% endif %}"><i class="fas fa-video"></i></a>
        <a href="{{ url_for('profile', username=g.user.username) }}" class="nav-icon {% if request.endpoint == 'profile' %}active{% endif %}"><i class="fas fa-user-circle"></i></a>
        <a href="#" class="nav-icon"><i class="fas fa-bell"></i></a>
        <a href="#" class="nav-icon"><i class="fas fa-bars"></i></a>
    </nav>
    {% endif %}

    <main class="main-content {% if request.endpoint == 'reels' %}full-screen{% endif %}">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script>
        function openComposer() {
            document.getElementById('post-composer-modal').style.display = 'flex';
        }

        function closeComposer() {
            document.getElementById('post-composer-modal').style.display = 'none';
        }

        // Close modal if user clicks outside of the modal content
        window.onclick = function(event) {
            const modal = document.getElementById('post-composer-modal');
            if (event.target == modal) {
                closeComposer();
            }
        }

        function checkPremiumFeatures(selectedMode) {
            const premiumSection = document.getElementById('premium-feature-section');
            if (!premiumSection) return; // a user might not have the section if they are not premium, so we check

            const isPremiumUser = {{ g.user.is_premium|tojson }};

            if (isPremiumUser && selectedMode === 'Music') {
                premiumSection.style.display = 'block';
            } else {
                premiumSection.style.display = 'none';
            }
        }

        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</body>
</html>
