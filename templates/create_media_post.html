{% extends "base.html" %}

{% block title %}Create {{ media_type.capitalize() }} Post - GLOOBA{% endblock %}

{% block content %}
<div class="main-content">
    <div class="settings-card">
        <h1>Upload a {{ media_type.capitalize() }}</h1>
        <p>Share a new {{ media_type }} with your followers.</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group" style="margin-top: 20px;">
                <label for="media-file">Choose a {{ media_type }} file:</label>
                <input type="file" name="media_file" id="media-file" required
                       accept="{{ 'image/*' if media_type == 'photo' else 'video/*' }}">
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="text_content">Caption (optional):</label>
                <textarea name="text_content" id="text_content" placeholder="Write a caption..."></textarea>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="mode-select">Choose a mode:</label>
                <select name="mode" id="mode-select" required>
                    <option value="">Select Mode</option>
                    <option value="Art">Art</option>
                    <option value="Travel">Travel</option>
                    <option value="Lifestyle">Lifestyle</option>
                    <option value="Tech">Tech</option>
                </select>
            </div>

            <button type="submit" class="btn-save-settings" style="margin-top: 20px;">Post {{ media_type.capitalize() }}</button>
        </form>
    </div>
</div>
{% endblock %}
