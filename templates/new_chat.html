{% extends "base.html" %}

{% block title %}New Chat - GLOOBA{% endblock %}

{% block head %}
<style>
    .new-chat-container { max-width: 600px; margin: 20px auto; }
    .user-list-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; text-decoration: none; color: inherit; }
    .user-list-item:hover { background-color: #f9f9f9; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }
    .user-name { font-weight: bold; }
    .create-group-btn-container { text-align: center; padding: 20px; }
</style>
{% endblock %}

{% block content %}
<div class="new-chat-container">
    <div class="inbox-header">
        <a href="{{ url_for('chat_inbox') }}"><i class="fas fa-arrow-left"></i></a>
        <h2>New Chat</h2>
    </div>

    <div class="user-list">
        {% for user in users %}
            <a href="{{ url_for('start_chat', user_id=user.id) }}" class="user-list-item">
                <img src="https://i.pravatar.cc/150?u={{ user.username }}" alt="{{ user.username }}'s avatar" class="user-avatar">
                <div class="user-details">
                    <span class="user-name">{{ user.full_name }}</span>
                    <div class="user-username">@{{ user.username }}</div>
                </div>
            </a>
        {% else %}
            <p style="text-align: center; padding: 20px;">No other users found.</p>
        {% endfor %}
    </div>

    <div class="create-group-btn-container">
        <a href="{{ url_for('create_group') }}" class="btn">Create Group</a>
    </div>
</div>
{% endblock %}
