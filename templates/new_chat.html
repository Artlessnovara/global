{% extends "base.html" %}

{% block title %}New Chat - GLOOBA{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('chat_inbox') }}"><i class="fas fa-arrow-left"></i></a>
                    <h5 class="mb-0">New Message</h5>
                    <a href="{{ url_for('create_group') }}" class="btn btn-primary">Create Group</a>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        {% for user in users %}
                            <a href="{{ url_for('start_chat', user_id=user.id) }}" class="list-group-item list-group-item-action d-flex align-items-center">
                                <img src="{{ url_for('static', filename='img/default-avatar.png') }}" alt="{{ user.username }}" class="chat-avatar me-3">
                                <div>
                                    <strong>{{ user.full_name }}</strong>
                                    <div class="text-muted">@{{ user.username }}</div>
                                </div>
                            </a>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
