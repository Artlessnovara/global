{% extends "base.html" %}

{% block title %}Create Group - GLOOBA{% endblock %}

{% block head %}
<style>
    .create-group-container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input[type="text"], .form-group input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #dbdbdb;
        border-radius: 3px;
        box-sizing: border-box;
    }
    .form-group select { width: 100%; }
    .btn-submit { background-color: #0095f6; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
</style>
<!-- Include Tom-Select CSS -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="create-group-container">
    <div class="inbox-header">
        <a href="{{ url_for('new_chat') }}"><i class="fas fa-arrow-left"></i></a>
        <h2>Create Group</h2>
    </div>

    <form method="POST" action="{{ url_for('create_group') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="group_name">Group Name</label>
            <input type="text" id="group_name" name="group_name" required>
        </div>

        <div class="form-group">
            <label for="group_photo">Group Photo (Optional)</label>
            <input type="file" id="group_photo" name="group_photo" accept="image/*">
        </div>

        <div class="form-group">
            <label for="members">Add Members</label>
            <select id="members" name="members" multiple required>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.full_name }} (@{{ user.username }})</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-submit">Create Group</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<!-- Include Tom-Select JS -->
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        new TomSelect('#members', {
            plugins: ['remove_button'],
            create: false,
            sortField: {
                field: "text",
                direction: "asc"
            }
        });
    });
</script>
{% endblock %}
