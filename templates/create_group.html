{% extends "base.html" %}

{% block title %}Create Group - GLOOBA{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h5>Create New Group</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('create_group') }}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="group_name" class="form-label">Group Name</label>
                            <input type="text" class="form-control" id="group_name" name="group_name" required>
                        </div>
                        <div class="mb-3">
                            <label for="group_photo" class="form-label">Group Photo</label>
                            <input type="file" class="form-control" id="group_photo" name="group_photo" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Select Members</label>
                            <div class="user-select-list">
                                {% for user in users %}
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="members" value="{{ user.id }}" id="user-{{ user.id }}">
                                    <label class="form-check-label" for="user-{{ user.id }}">
                                        <img src="{{ url_for('static', filename='img/default-avatar.png') }}" alt="{{ user.username }}" class="chat-avatar-sm me-2">
                                        {{ user.full_name }}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Create Group</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
