<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GLOOBA</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .main-container { text-align: center; }
        .logo { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .form-container { background-color: #fff; border: 1px solid #dbdbdb; border-radius: 3px; padding: 40px; width: 350px; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; }
        .btn { display: block; width: 100%; padding: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-login { background-color: #0095f6; color: white; margin-top: 15px; }
        .separator { display: flex; align-items: center; text-align: center; color: #8e8e8e; margin: 15px 0; }
        .separator::before, .separator::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .separator:not(:empty)::before { margin-right: .25em; }
        .separator:not(:empty)::after { margin-left: .25em; }
        .forgot-password { color: #00376b; text-decoration: none; font-size: 12px; }
        .signup-box { background-color: #fff; border: 1px solid #dbdbdb; border-radius: 3px; padding: 20px; width: 350px; }
        .signup-box p { margin: 0; font-size: 14px; }
        .signup-box a { color: #0095f6; font-weight: bold; text-decoration: none; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 3px; font-size: 14px; }
        .alert-error { color: #a94442; background-color: #f2dede; }
        .alert-success { color: #3c763d; background-color: #dff0d8; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-container">
            <div class="logo">GLOOBA</div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Email, or username" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-login">Log In</button>
                <div class="separator">OR</div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </form>
        </div>
        <div class="signup-box">
            <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
