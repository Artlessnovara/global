{% extends "base.html" %}

{% block title %}Add Members to {{ conversation.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <a href="{{ url_for('chat_info', conversation_id=conversation.id) }}"><i class="fas fa-arrow-left"></i></a>
                    <h5 class="mb-0">Add Members</h5>
                    <div></div> {# Spacer #}
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_group_members', conversation_id=conversation.id) }}">
                        <div class="mb-3">
                            <label class="form-label">Select users to add:</label>
                            <div class="user-select-list">
                                {% for user in users %}
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="members" value="{{ user.id }}" id="user-{{ user.id }}">
                                    <label class="form-check-label" for="user-{{ user.id }}">
                                        <img src="{{ url_for('static', filename='img/default-avatar.png') }}" alt="{{ user.username }}" class="chat-avatar-sm me-2">
                                        {{ user.full_name }}
                                    </label>
                                </div>
                                {% else %}
                                <p class="text-muted">No more users to add.</p>
                                {% endfor %}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" {% if not users %}disabled{% endif %}>Add to Group</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
