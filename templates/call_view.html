{% extends "base.html" %}

{% block title %}Call - GLOOBA{% endblock %}

{% block content %}
<div class="call-container">
    <div class="video-grid">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
    </div>
    <div class="call-controls">
        <button id="mic-btn" class="control-btn"><i class="fas fa-microphone"></i></button>
        <button id="camera-btn" class="control-btn"><i class="fas fa-video"></i></button>
        <button id="hangup-btn" class="control-btn hangup"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<script src="{{ url_for('static', filename='js/webrtc.js') }}"></script>
<script>
    // Pass data from Flask to our WebRTC script
    const conversationId = "{{ conversation.id }}";
    const currentUserId = "{{ g.user.id }}";
    // This is a simplified way to know who to call. In a real app, you'd have a more robust system.
    const otherUserId = "{{ other_user.id if other_user else '' }}";

    document.addEventListener('DOMContentLoaded', () => {
        init(conversationId, currentUserId, otherUserId);
    });
</script>
<style>
    body, html {
        background-color: #202124;
        color: white;
    }
    .main-content.full-screen {
        height: 100vh;
        width: 100%;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .call-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .video-grid {
        flex-grow: 1;
        position: relative;
    }
    #remote-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    #local-video {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 25%;
        max-width: 250px;
        border: 2px solid white;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .call-controls {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        background-color: rgba(0,0,0,0.5);
        padding: 15px 30px;
        border-radius: 30px;
    }
    .control-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .control-btn.active {
         background: #4a8eff;
    }
    .control-btn.hangup {
        background-color: #ea4335;
    }
</style>
{% endblock %}
