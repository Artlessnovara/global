{% extends "base.html" %}

{% block title %}Group Call - GLOOBA{% endblock %}

{% block content %}
<div class="call-container">
    <div id="video-grid" class="video-grid">
        <div class="video-container">
            <video id="local-video" autoplay playsinline muted></video>
            <span class="video-label">You</span>
        </div>
        <!-- Remote videos will be added here dynamically -->
    </div>
    <div id="reactions-container" class="reactions-container"></div>
    <div class="call-controls">
        <button id="mic-btn" class="control-btn"><i class="fas fa-microphone"></i></button>
        <button id="camera-btn" class="control-btn"><i class="fas fa-video"></i></button>
        <button id="react-btn" class="control-btn"><i class="fas fa-heart"></i></button>
        <button id="hangup-btn" class="control-btn hangup"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<script src="{{ url_for('static', filename='js/webrtc.js') }}"></script>
<script>
    const conversationId = "{{ conversation.id }}";
    document.addEventListener('DOMContentLoaded', () => {
        init(conversationId);
    });
</script>
<style>
    body, html {
        background-color: #202124;
        color: white;
    }
    .main-content.full-screen {
        height: 100vh;
        width: 100%;
        padding: 0;
        margin: 0;
        display: flex;
    }
    .call-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    .video-grid {
        flex-grow: 1;
        display: grid;
        gap: 10px;
        padding: 10px;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    .video-container {
        position: relative;
        background-color: #333;
        border-radius: 8px;
        overflow: hidden;
    }
    .video-grid video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .video-label {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0,0,0,0.5);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 14px;
    }
    .call-controls {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        background-color: rgba(0,0,0,0.5);
        padding: 15px 30px;
        border-radius: 30px;
    }
    .control-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        font-size: 24px;
        cursor: pointer;
    }
    .control-btn.hangup {
        background-color: #ea4335;
    }
    .reactions-container {
        position: absolute;
        bottom: 120px;
        right: 20px;
        width: 100px;
        height: 300px;
        pointer-events: none;
    }
    .floating-reaction {
        position: absolute;
        bottom: 0;
        left: 50%;
        font-size: 40px;
        animation: floatUp 4s ease-out forwards;
        opacity: 1;
    }
    @keyframes floatUp {
        from {
            transform: translateY(0) translateX(-50%);
            opacity: 1;
        }
        to {
            transform: translateY(-300px) translateX(-50%);
            opacity: 0;
        }
    }
</style>
{% endblock %}
